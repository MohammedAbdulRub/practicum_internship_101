version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: smb_crm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smb_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smb_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: smb_crm_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smb_crm
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
